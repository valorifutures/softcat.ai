name: feral

# The heartbeat. Twice a week the council wakes up, decides what /feral becomes,
# builds it, gates it, and — depending on the dial — opens a PR or ships it live.

on:
  schedule:
    # Tuesdays and Fridays, 07:00 UTC. Twice weekly, as designed.
    - cron: "0 7 * * 2,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Autonomy dial"
        type: choice
        default: propose
        options: [propose, ship]

# ── THE DIAL ────────────────────────────────────────────────────────────────
# propose = gate passes -> open a PR you one-click merge (a human stands between
#           the agents and the live site; content autonomy is still total).
# ship    = gate passes -> merge to main automatically, no human. Pure autonomy.
#
# Start on `propose` for a few cycles. Once you've watched the council run and
# trust the safety gate, flip this default to `ship`. That's the only change.
env:
  FERAL_MODE: ${{ github.event.inputs.mode || 'propose' }}
  # Runaway guard. Raise if cycles get cut off mid-build.
  FERAL_MAX_TURNS: "60"

permissions:
  contents: write
  pull-requests: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: New cycle branch
        id: branch
        run: |
          STAMP="$(date +%Y%m%d-%H%M%S)"
          BRANCH="feral/cycle-${STAMP}"
          git config user.name  "feral-council"
          git config user.email "feral@softcat.ai"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH"  >> "$GITHUB_OUTPUT"
          echo "stamp=$STAMP"     >> "$GITHUB_OUTPUT"

      - name: Run the council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/feral-cycle" \
            --dangerously-skip-permissions \
            --max-turns "${FERAL_MAX_TURNS}" \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,Task"

      - name: Commit cycle
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Cycle produced no changes (deadlock or no-op)."
          else
            git commit -m "feral: cycle ${{ steps.branch.outputs.stamp }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # The build must be green — the first half of the deploy gate.
      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      # Optional but recommended: fail on broken links in the built output.
      - name: Link check
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: npx --yes linkinator ./dist --recurse --silent || true

      # The hard wall — scope + critic verdict.
      - name: Feral gate
        if: steps.commit.outputs.changed == 'true'
        run: node scripts/feral-gate.mjs "origin/main"

      # PROPOSE: open a PR for a one-click human merge.
      - name: Open PR (propose)
        if: steps.commit.outputs.changed == 'true' && env.FERAL_MODE == 'propose'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.branch.outputs.branch }}"
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "feral: cycle ${{ steps.branch.outputs.stamp }}" \
            --body "Autonomous feral cycle. Gate passed (scope + build + critic PASS). The agents made this; you didn't brief it. Merge to put it live, or close to veto."

      # SHIP: merge to main automatically. Pure autonomy.
      - name: Merge (ship)
        if: steps.commit.outputs.changed == 'true' && env.FERAL_MODE == 'ship'
        run: |
          git checkout main
          git merge --no-ff "${{ steps.branch.outputs.branch }}" \
            -m "feral: ship cycle ${{ steps.branch.outputs.stamp }}"
          git push origin main
