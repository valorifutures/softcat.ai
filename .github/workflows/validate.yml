name: Validate PR build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/validate-tools-data.mjs
      - run: npm run build
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Bot unit tests
        run: |
          pip install -q pytest httpx python-dotenv feedparser anthropic
          python -m pytest bot/tests/ -q
